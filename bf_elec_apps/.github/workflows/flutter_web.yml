name: Flutter Web Deploy

on:
  push:
    branches:
      - master

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: |
          flutter pub run flutter_bootstrap.py \
            --target=lib/main.dart \
            --worker=worker.js \
            --output=build/web \
            --deferred-loading \
            --flavor=prod \
            --dart-define-from-file=flutter_bootstrap.json \
            --dart-define=TITLE=BFELECAPPS \
            --dart-define=BASE_HREF=/bfelecapps/ \
            --dart-define=kIsWeb=true \
            --dart-define=FLUTTER_WEB_USE_SKIA=true \
          flutter build web --dart-define=kIsWeb=true --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Configure Flutter CanvasKit and Disable Service Worker
        shell: bash
        run: |
          mkdir -p build/web/canvaskit
          cp -r packages/flutter_tools/lib/src/flutter_bootstrap/directory/kits /tmp/flutter_canvas_kit 2>/dev/null || true
          find packages/flutter_tools -name "flutter_service_worker.js" -exec cp {} build/web/ \; 2>/dev/null || true
          echo '// Service worker placeholder to unregister self' > build/web/flutter_service_worker.js
          echo 'self.addEventListener("install", (e) => self.skipWaiting());' >> build/web/flutter_service_worker.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          keep_files: true
          allow_empty_commit: true
