<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFELECAPPS</title>
  <base href="/bfelecapps/" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .loading-container h1 {
      color: #0f4c81;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .loading-container p {
      color: #64748b;
      font-size: 16px;
      max-width: 400px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <h1>Loading BFELECAPPS...</h1>
      <p>Initializing the premium industrial portal. Please wait while we load the application.</p>
    </div>
  </div>

  <script src="main.dart.js" type="application/javascript" defer></script>
  <script>
    window.addEventListener('error', function(e) {
      if (!document.getElementById('error-reported')) {
        console.error('Application error:', e.error);
        const errorDiv = document.createElement('div');
        errorDiv.id = 'error-reported';
        errorDiv.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); ' +
                                  'background: #fee2e2; border: 2px solid #dc2626; padding: 20px; border-radius: 8px; ' +
                                  'max-width: 80%; text-align: center; z-index: 9999;';
        errorDiv.innerHTML = '<h2>Application Error</h2><p>Unable to load the BFELECAPPS portal. Please refresh the page or try again later.</p>' +
                             '<button onclick="location.reload()" style="margin-top: 16px; padding: 8px 16px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer;">Refresh Page</button>';
        document.body.appendChild(errorDiv);
      }
    });
  </script>
</body>
</html>
