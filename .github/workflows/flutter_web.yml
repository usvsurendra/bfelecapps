name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'bf_elec_apps/**'
      - '.github/workflows/flutter_web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bf_elec_apps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /bfelecapps/

      - name: Use local CanvasKit + disable service worker (avoid gstatic CDN hang and stale-cache blank screen)
        run: |
          # 1) Load CanvasKit from local app files instead of gstatic CDN.
          sed -i "s/_flutter.loader.load({/_flutter.loader.load({ config: { canvasKitBaseUrl: 'canvaskit\/' },\n/" build/web/flutter_bootstrap.js
          grep -q "canvasKitBaseUrl" build/web/flutter_bootstrap.js && echo "patched: local CanvasKit enabled" || echo "patch FAILED"
          # 2) Disable the Flutter service worker so a previously cached (broken)
          #    build is never served to returning visitors.
          perl -0pi -e "s/serviceWorkerSettings: \\{[^}]*\\}/serviceWorkerSettings: undefined/" build/web/flutter_bootstrap.js
          # 3) Replace flutter_service_worker.js with a no-op that unregisters
          #    any already-installed service worker and clears its cache.
          cat > build/web/flutter_service_worker.js <<'SWEOF'
          // No-op service worker: unregister self and clear caches so the app
          // always loads fresh assets (prevents stale cached blank screens).
          self.addEventListener('install', function () { self.skipWaiting(); });
          self.addEventListener('activate', function (event) {
            event.waitUntil(
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).then(function () { return self.registration.unregister(); })
            );
          });
          SWEOF
          echo "service worker neutralized"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bf_elec_apps/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
