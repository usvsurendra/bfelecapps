name: Flutter Web Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href /bfelecapps/

      - name: Disable service worker
        shell: bash
        run: |
          if [ -f build/web/flutter_service_worker.js ]; then
            echo '// Service worker placeholder to unregister self' > build/web/flutter_service_worker.js
            echo 'self.addEventListener("install", (e) => self.skipWaiting());' >> build/web/flutter_service_worker.js
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
